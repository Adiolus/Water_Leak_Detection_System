<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaGuard Monitor - Web Integration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #f1f5f9;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .status-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding: 10px;
            background: #334155;
            border-radius: 8px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ef4444;
        }

        .status-dot.connected {
            background: #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .state-display {
            text-align: center;
            padding: 40px;
            border-radius: 12px;
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .state-display.IDLE,
        .state-display.NORMAL_FLOW {
            background: #10b981;
        }

        .state-display.CONTINUOUS_FLOW,
        .state-display.OVERUSAGE,
        .state-display.MINI_LEAK {
            background: #f59e0b;
        }

        .state-display.NON_USAGE_TIME_LEAK,
        .state-display.CRITICAL_LEAK,
        .state-display.CUTOFF {
            background: #ef4444;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .metric-box {
            background: #334155;
            padding: 20px;
            border-radius: 8px;
        }

        .metric-label {
            font-size: 0.875rem;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .learning-banner {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .progress-bar {
            background: rgba(255, 255, 255, 0.3);
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            background: white;
            height: 100%;
            transition: width 0.3s ease;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }

        button:hover {
            background: #2563eb;
        }

        button.danger {
            background: #ef4444;
        }

        button.danger:hover {
            background: #dc2626;
        }

        #alertLog {
            max-height: 300px;
            overflow-y: auto;
            background: #334155;
            padding: 15px;
            border-radius: 8px;
        }

        .alert-item {
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
            border-left: 4px solid #64748b;
            background: #1e293b;
        }

        .alert-time {
            font-size: 0.875rem;
            color: #94a3b8;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="margin-bottom: 20px; color: #60a5fa;">AquaGuard ML Water Monitoring</h1>
        
        <div class="connection-status">
            <div class="status-dot" id="connectionDot"></div>
            <span id="connectionText">Connecting to bridge...</span>
        </div>

        <div id="learningBanner" class="learning-banner" style="display: none;">
            <h3>🧠 ML Learning Mode Active</h3>
            <div class="progress-bar">
                <div class="progress-fill" id="learningProgress" style="width: 0%"></div>
            </div>
            <p id="learningText">Learning water usage patterns...</p>
        </div>

        <div class="state-display" id="stateDisplay">
            CONNECTING...
        </div>

        <div class="status-card">
            <h2 style="margin-bottom: 20px; color: #60a5fa;">Real-Time Metrics</h2>
            <div class="metrics">
                <div class="metric-box">
                    <div class="metric-label">Master Node Flow</div>
                    <div class="metric-value" id="masterFlow">0.00 L/min</div>
                </div>
                <div class="metric-box">
                    <div class="metric-label">Client Node Flow</div>
                    <div class="metric-value" id="clientFlow">0.00 L/min</div>
                </div>
                <div class="metric-box">
                    <div class="metric-label">System State</div>
                    <div class="metric-value" id="currentState">IDLE</div>
                </div>
                <div class="metric-box">
                    <div class="metric-label">Learning Status</div>
                    <div class="metric-value" id="learningStatus">Active</div>
                </div>
            </div>
        </div>

        <div class="status-card">
            <h2 style="margin-bottom: 20px; color: #60a5fa;">System Controls</h2>
            <div class="controls">
                <button onclick="sendCommand('RESET')">Reset System</button>
                <button onclick="sendCommand('STATUS')">Show Learning Status</button>
                <button class="danger" onclick="sendCommand('CUTOFF')">Emergency Cutoff</button>
                <button onclick="sendCommand('RESET_LEARNING')">Reset Learning</button>
            </div>
        </div>

        <div class="status-card">
            <h2 style="margin-bottom: 20px; color: #60a5fa;">Alert Log</h2>
            <div id="alertLog"></div>
        </div>
    </div>

    <script>
        // WebSocket connection to the bridge
        let ws;
        const BRIDGE_URL = 'ws://localhost:3001'; // Change this to your bridge server URL
        
        let alerts = [];

        function connectWebSocket() {
            ws = new WebSocket(BRIDGE_URL);
            
            ws.onopen = () => {
                console.log('Connected to AquaGuard bridge');
                document.getElementById('connectionDot').classList.add('connected');
                document.getElementById('connectionText').textContent = 'Connected to hardware';
            };
            
            ws.onmessage = (event) => {
                try {
                    const message = JSON.parse(event.data);
                    
                    if (message.type === 'state_update' || message.type === 'initial_state') {
                        updateDisplay(message.data);
                    }
                } catch (err) {
                    console.error('Error parsing message:', err);
                }
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
            
            ws.onclose = () => {
                console.log('Disconnected from bridge. Reconnecting...');
                document.getElementById('connectionDot').classList.remove('connected');
                document.getElementById('connectionText').textContent = 'Disconnected. Reconnecting...';
                
                // Attempt to reconnect after 3 seconds
                setTimeout(connectWebSocket, 3000);
            };
        }

        function updateDisplay(data) {
            // Update state display
            const stateDisplay = document.getElementById('stateDisplay');
            stateDisplay.textContent = getStateLabel(data.state);
            stateDisplay.className = 'state-display ' + data.state;
            
            // Update metrics
            document.getElementById('masterFlow').textContent = data.flow.toFixed(2) + ' L/min';
            document.getElementById('clientFlow').textContent = data.clientFlow.toFixed(2) + ' L/min';
            document.getElementById('currentState').textContent = data.state.replace(/_/g, ' ');
            
            // Update learning status
            if (data.learningMode) {
                document.getElementById('learningBanner').style.display = 'block';
                document.getElementById('learningStatus').textContent = `Day ${data.learningDays}/30`;
                document.getElementById('learningProgress').style.width = ((data.learningDays / 30) * 100) + '%';
                document.getElementById('learningText').textContent = 
                    `Learning day ${data.learningDays} of 30 - Building water usage pattern model`;
            } else {
                document.getElementById('learningBanner').style.display = 'none';
                document.getElementById('learningStatus').textContent = 'Operational';
            }
            
            // Add alerts for state changes
            if (shouldAlert(data.state)) {
                addAlert(data.state, data.flow);
            }
        }

        function getStateLabel(state) {
            const labels = {
                'IDLE': '✓ System Idle',
                'NORMAL_FLOW': '✓ Normal Flow',
                'CONTINUOUS_FLOW': 'Continuous Flow',
                'OVERUSAGE': '⚠️ TAP LEFT ON',
                'MINI_LEAK': '⚠️ Mini Leak Detected',
                'NON_USAGE_TIME_LEAK': '⚠️ Night Leak Alert',
                'CRITICAL_LEAK': '🚨 CRITICAL LEAK',
                'CUTOFF': '🔴 EMERGENCY CUTOFF'
            };
            return labels[state] || state;
        }

        function shouldAlert(state) {
            return ['OVERUSAGE', 'MINI_LEAK', 'NON_USAGE_TIME_LEAK', 'CRITICAL_LEAK', 'CUTOFF'].includes(state);
        }

        function addAlert(state, flow) {
            const alertLog = document.getElementById('alertLog');
            const time = new Date().toLocaleTimeString();
            
            const alertDiv = document.createElement('div');
            alertDiv.className = 'alert-item';
            alertDiv.innerHTML = `
                <div class="alert-time">${time}</div>
                <div>${getStateLabel(state)} - Flow: ${flow.toFixed(2)} L/min</div>
            `;
            
            alertLog.insertBefore(alertDiv, alertLog.firstChild);
            
            // Keep only last 20 alerts
            while (alertLog.children.length > 20) {
                alertLog.removeChild(alertLog.lastChild);
            }
        }

        function sendCommand(command) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: command }));
                console.log('Sent command:', command);
            } else {
                alert('Not connected to bridge');
            }
        }

        // Connect on page load
        connectWebSocket();
    </script>
</body>
</html>
